<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhoneDr Admin - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root {
            --primary: #00aaff;
            --secondary: #7bd0ff;
            --background: #000000;
            --surface: #111114;
            --border: rgba(0, 170, 255, 0.2);
        }
        body {
            background-color: var(--background);
            color: white;
            font-family: 'Manrope', sans-serif;
            overflow-x: hidden;
            padding-bottom: 80px; /* Space for bottom nav */
        }
        .font-headline { font-family: 'Space+Grotesk', sans-serif; }
        .glass-card {
            background: var(--surface);
            border: 1px solid var(--border);
            backdrop-filter: blur(20px);
        }
        .login-card {
            box-shadow: 0 0 40px rgba(0, 170, 255, 0.1);
        }
        input, select, textarea {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--primary) !important;
            outline: none !important;
            box-shadow: 0 0 0 2px rgba(0, 170, 255, 0.2) !important;
        }
        .hidden { display: none !important; }
        
        /* Mobile Optimized Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 12, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 100;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #94a3b8;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .nav-item.active {
            color: var(--primary);
        }
        .nav-item span {
            font-size: 24px;
        }

        /* Product Cards for Mobile */
        .product-card {
            background: #111114;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 16px;
            transition: all 0.3s;
        }
        .product-card:active {
            transform: scale(0.98);
            background: #16161a;
        }

        .modal-overlay {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(12px);
        }

        /* Fullscreen Modal on Mobile */
        @media (max-width: 768px) {
            .modal-content {
                width: 100% !important;
                height: 100% !important;
                max-height: 100% !important;
                border-radius: 0 !important;
                margin: 0 !important;
            }
        }
    </style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="login-page" class="fixed inset-0 z-[9999] bg-black flex items-center justify-center p-6">
    <div class="login-card glass-card rounded-[2.5rem] p-10 w-full max-w-md text-center">
        <div class="mb-8">
            <div class="w-20 h-20 bg-blue-500/10 rounded-3xl flex items-center justify-center mx-auto mb-6 border border-blue-500/20">
                <span class="material-symbols-outlined text-4xl text-blue-500">lock_person</span>
            </div>
            <h1 class="text-3xl font-headline font-black tracking-tighter text-white">PhoneDr Admin</h1>
            <p class="text-slate-500 mt-2 text-sm">Gestion de boutique sécurisée</p>
        </div>
        <form id="login-form" class="space-y-6">
            <div class="text-left">
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 block ml-1">Mot de passe</label>
                <input type="password" id="admin-password" required class="w-full px-6 py-5 rounded-2xl transition-all text-lg" placeholder="••••••••">
            </div>
            <p id="login-error" class="text-red-500 text-sm hidden font-bold">⚠️ Mot de passe incorrect</p>
            <button type="submit" class="w-full py-5 bg-blue-600 text-white font-black rounded-2xl shadow-xl shadow-blue-600/20 active:scale-[0.98] transition-all text-lg">
                Se connecter
            </button>
        </form>
    </div>
</div>

<!-- DASHBOARD PAGE -->
<div id="dashboard-page" class="min-h-screen hidden">
    <!-- Top Header -->
    <header class="p-6 pb-0 flex justify-between items-center sticky top-0 bg-black/80 backdrop-blur-xl z-50">
        <div>
            <p class="text-[10px] font-black text-blue-500 uppercase tracking-[0.2em] mb-1">Panneau de contrôle</p>
            <h1 id="page-title" class="text-2xl font-headline font-black">Produits</h1>
        </div>
        <button onclick="logout()" class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-red-500">
            <span class="material-symbols-outlined text-xl">logout</span>
        </button>
    </header>

    <!-- Search & Stats Bar -->
    <div class="p-6 space-y-4">
        <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500">🔍</span>
            <input type="text" id="product-search" oninput="renderTable()" placeholder="Rechercher un produit..." class="w-full pl-12 pr-6 py-4 rounded-2xl bg-white/5 border border-white/10 text-sm font-bold">
        </div>

        <div class="grid grid-cols-2 gap-3">
            <div class="bg-[#111114] p-4 rounded-2xl border border-white/5">
                <p class="text-[8px] font-black text-slate-500 uppercase tracking-widest mb-1">Total</p>
                <p id="stat-total" class="text-xl font-headline font-black">0</p>
            </div>
            <div class="bg-[#111114] p-4 rounded-2xl border border-white/5">
                <p class="text-[8px] font-black text-red-500 uppercase tracking-widest mb-1">En Promo</p>
                <p id="stat-promo" class="text-xl font-headline font-black">0</p>
            </div>
        </div>
    </div>

    <!-- Main Content (Card List for Mobile) -->
    <main class="p-6 pt-0" id="products-list-container">
        <!-- Products will be rendered here as cards -->
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <button onclick="switchTab('list')" class="nav-item active" id="nav-list">
            <span class="material-symbols-outlined">inventory_2</span>
            STOCK
        </button>
        <button onclick="openAddModal()" class="nav-item text-blue-500 bg-blue-500/10 p-3 -mt-6 rounded-2xl border border-blue-500/20 shadow-lg shadow-blue-500/20">
            <span class="material-symbols-outlined">add</span>
        </button>
        <button onclick="switchTab('promo')" class="nav-item" id="nav-promo">
            <span class="material-symbols-outlined">timer</span>
            PROMOS
        </button>
    </nav>
</div>

<!-- ADD/EDIT MODAL (SINGLE CONSOLIDATED VERSION) -->
<div id="product-modal" class="fixed inset-0 z-[1000] modal-overlay hidden flex items-center justify-center">
    <div class="modal-content glass-card rounded-[2.5rem] w-full max-w-2xl max-h-[100vh] overflow-y-auto p-8 relative">
        <div class="flex justify-between items-center mb-8">
            <h2 id="modal-title" class="text-2xl font-headline font-black">Ajouter produit</h2>
            <button onclick="closeModal()" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-slate-400">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        
        <form id="product-form" class="space-y-6 pb-10">
            <input type="hidden" id="edit-id">
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 block ml-1">Nom & Marque</label>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="p-name" required class="px-5 py-4 rounded-xl font-bold" placeholder="ex: iPhone 15">
                        <input type="text" id="p-brand" required class="px-5 py-4 rounded-xl font-bold" placeholder="ex: Apple">
                    </div>
                </div>
                
                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 block ml-1">Type & Catégorie</label>
                    <div class="grid grid-cols-2 gap-3">
                        <select id="p-type" required class="px-5 py-4 rounded-xl font-bold" onchange="toggleProductTypeFields()">
                            <option value="smartphone">Téléphone</option>
                            <option value="laptop">Ordinateur</option>
                            <option value="accessoire">Accessoire</option>
                        </select>
                        <div id="acc-cat-container" class="hidden">
                            <select id="p-acc-cat" class="w-full px-5 py-4 rounded-xl font-bold">
                                <option value="coques">Coques</option>
                                <option value="chargeurs">Chargeurs</option>
                                <option value="casques">Audio</option>
                                <option value="ordinateurs">PC Acc</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 block ml-1">Prix (MAD)</label>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <p class="text-[8px] text-slate-600 mb-1">Actuel</p>
                            <input type="number" id="p-price" required class="w-full px-5 py-4 rounded-xl font-black text-blue-400" placeholder="0">
                        </div>
                        <div>
                            <p class="text-[8px] text-slate-600 mb-1">Barré (Optionnel)</p>
                            <input type="number" id="p-old-price" class="w-full px-5 py-4 rounded-xl font-bold text-slate-500" placeholder="0">
                        </div>
                    </div>
                </div>

                <!-- Locations (Accueil, Boutique, etc.) -->
                <div class="bg-white/5 p-4 rounded-2xl border border-white/10">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3 block">Emplacements d'affichage</label>
                    <div class="grid grid-cols-2 gap-3">
                        <label class="flex items-center gap-2 cursor-pointer bg-black/20 p-3 rounded-xl border border-white/5">
                            <input type="checkbox" id="loc-accueil" checked class="accent-blue-500">
                            <span class="text-[10px] font-bold text-slate-300">Accueil</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer bg-black/20 p-3 rounded-xl border border-white/5">
                            <input type="checkbox" id="loc-boutique" checked class="accent-blue-500">
                            <span class="text-[10px] font-bold text-slate-300">Boutique</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer bg-black/20 p-3 rounded-xl border border-white/5">
                            <input type="checkbox" id="loc-promotions" class="accent-blue-500">
                            <span class="text-[10px] font-bold text-slate-300">Promotions</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer bg-black/20 p-3 rounded-xl border border-white/5">
                            <input type="checkbox" id="loc-accessoires" class="accent-blue-500">
                            <span class="text-[10px] font-bold text-slate-300">Accessoires</span>
                        </label>
                    </div>
                </div>

                <!-- NEW: PROMO COUNTDOWN -->
                <div id="promo-timer-container" class="bg-blue-500/5 border border-blue-500/10 p-4 rounded-2xl">
                    <label class="text-[10px] font-black text-blue-500 uppercase tracking-widest mb-2 block">⏳ Chrono promo (Optionnel)</label>
                    <input type="datetime-local" id="p-promo-expiry" class="w-full px-5 py-4 rounded-xl font-bold text-white bg-transparent border-white/10">
                </div>

                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 block ml-1">Images du produit</label>
                    <input type="file" id="p-images-input" accept="image/*" multiple class="hidden">
                    <button type="button" onclick="document.getElementById('p-images-input').click()" class="w-full px-5 py-4 rounded-xl bg-white/5 border border-dashed border-white/20 flex items-center justify-center gap-2 font-bold">
                        <span class="material-symbols-outlined">add_photo_alternate</span>
                        Choisir Images
                    </button>
                    <div id="img-preview-container" class="grid grid-cols-4 gap-2 mt-3">
                        <!-- Preview thumbnails -->
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 block ml-1">Badge</label>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="p-badge" class="px-5 py-4 rounded-xl font-bold" placeholder="PROMO">
                        <select id="p-badge-color" class="px-5 py-4 rounded-xl font-bold">
                            <option value="primary">Bleu</option>
                            <option value="error">Rouge</option>
                            <option value="secondary">Cyan</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="pt-4">
                <button type="submit" class="w-full py-5 bg-blue-600 text-white font-black rounded-2xl shadow-xl shadow-blue-600/30 active:scale-[0.98] transition-all text-lg">
                    ENREGISTRER
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyBZr1TPeXcQnh3Bie1pkOx1PUH5u-mMvVw",
        authDomain: "phonedrshop-7924b.firebaseapp.com",
        projectId: "phonedrshop-7924b",
        databaseURL: "https://phonedrshop-7924b-default-rtdb.firebaseio.com"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const productsRef = db.ref('phonedr_products');

    // Load initial products
    productsRef.on('value', (snap) => {
        // Success handled by existing loadProducts logic
    });

    // --- AUTH LOGIC ---
    const loginForm = document.getElementById('login-form');
    const loginPage = document.getElementById('login-page');
    const dashboardPage = document.getElementById('dashboard-page');
    // Check session will be done at the bottom of the script
    loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const pass = document.getElementById('admin-password').value;
        if (pass === 'phonedr2024') {
            localStorage.setItem('admin_auth', 'true');
            showDashboard();
        } else {
            document.getElementById('login-error').classList.remove('hidden');
        }
    });

    function showDashboard() {
        loginPage.classList.add('hidden');
        dashboardPage.classList.remove('hidden');
        loadProducts();
        renderTable();
    }

    function logout() {
        localStorage.removeItem('admin_auth');
        location.reload();
    }

    // --- PRODUCT LOGIC ---
    let products = [];
    const DEFAULT_PRODUCTS = [
      { id: 1, name: "iPhone 15 Pro", brand: "Apple", cat: "iphones", price: 12499, oldPrice: 13999, img: "https://m.media-amazon.com/images/I/81SigAnN7pL._AC_SL1500_.jpg", badge: "PREMIUM", badgeColor: "primary", desc: "Le titane arrive sur iPhone. Une puce A17 Pro révolutionnaire.", specs: { "Écran": "6.1\" Super Retina XDR", "Puce": "A17 Pro", "Caméra": "48MP Main", "Batterie": "23h lecture vidéo" } },
      { id: 2, name: "Samsung S24 Ultra", brand: "Samsung", cat: "samsung", price: 11999, oldPrice: 12999, img: "https://m.media-amazon.com/images/I/71RZA9L78yL._AC_SL1500_.jpg", badge: "NOUVEAU", badgeColor: "secondary", desc: "L'ère de l'IA mobile est là. Un zoom optique incroyable.", specs: { "Écran": "6.8\" QHD+ Dynamic AMOLED", "Puce": "Snapdragon 8 Gen 3", "Caméra": "200MP Main", "Batterie": "5000mAh" } },
      { id: 3, name: "AirPods Pro 2", brand: "Apple", cat: "accessoires", accCat: "casques", price: 2499, oldPrice: 2999, img: "https://m.media-amazon.com/images/I/61f1Yf71HeL._AC_SL1500_.jpg", badge: "PROMO", badgeColor: "error", desc: "Réduction active du bruit deux fois plus performante.", specs: { "Puce": "H2 Apple", "Audio": "Spatial personnalisé", "Autonomie": "6h / 30h avec boîtier", "Résistance": "IP54" } },
      { id: 4, name: "Google Pixel 8 Pro", brand: "Google", cat: "google", price: 8999, oldPrice: 9999, img: "https://m.media-amazon.com/images/I/7190G98i3mL._AC_SL1500_.jpg", badge: "PREMIUM", badgeColor: "primary", desc: "Le meilleur de Google AI. Un appareil photo exceptionnel.", specs: { "Écran": "6.7\" LTPO OLED", "Puce": "Google Tensor G3", "Caméra": "50MP Triple", "Batterie": "5050mAh" } },
      { id: 5, name: "MacBook Air M3", brand: "Apple", cat: "accessoires", accCat: "ordinateurs", price: 14499, oldPrice: 15999, img: "https://m.media-amazon.com/images/I/71ItMZBcNYL._AC_SL1500_.jpg", badge: "PROMO", badgeColor: "error", desc: "Superpuissant. Superfin. Puce M3 ultra-rapide.", specs: { "Puce": "Apple M3", "Écran": "13.6\" Liquid Retina", "RAM": "8GB/16GB Unified", "Stockage": "256GB/512GB SSD" } },
      { id: 6, name: "Chargeur MagSafe", brand: "Apple", cat: "accessoires", accCat: "chargeurs", price: 499, oldPrice: 599, img: "https://m.media-amazon.com/images/I/51H7Mv8C47L._AC_SL1000_.jpg", badge: "ESSENTIEL", badgeColor: "primary", desc: "Recharge sans fil rapide et alignement magnétique parfait.", specs: { "Puissance": "Jusqu'à 15W", "Connecteur": "USB-C", "Compatibilité": "iPhone 12 et +" } }
    ];

    function loadProducts() {
        console.log("Tentative de chargement des produits depuis:", productsRef.toString());
        productsRef.on('value', (snapshot) => {
            const data = snapshot.val();
            console.log("Données reçues de Firebase:", data);
            if (data) {
                // Firebase Realtime DB might store as object or array
                if (Array.isArray(data)) {
                    products = data.filter(p => p !== null);
                } else {
                    products = Object.values(data);
                }
            } else {
                console.log("Base de données vide, chargement des produits par défaut...");
                products = [...DEFAULT_PRODUCTS];
                saveProducts();
            }
            renderTable();
        }, (error) => {
            console.error("Erreur de lecture Firebase:", error);
            alert("Erreur de lecture : " + error.message);
        });
    }

    function saveProducts() {
        console.log("Sauvegarde des produits...", products);
        productsRef.set(products).then(() => {
            console.log("Sauvegarde réussie !");
        }).catch(error => {
            console.error("ERREUR DE SAUVEGARDE FIREBASE:", error);
            alert("ERREUR DE SAUVEGARDE : " + error.message + "\n\nAssurez-vous que vos règles Firebase sont en .read: true et .write: true.");
        });
    }

    function renderTable() {
        const container = document.getElementById('products-list-container');
        const query = document.getElementById('product-search').value.toLowerCase();
        
        const filtered = products.filter(p => 
            (p.name || '').toLowerCase().includes(query) || 
            (p.brand || '').toLowerCase().includes(query) ||
            (p.cat || '').toLowerCase().includes(query)
        );

        if (filtered.length === 0) {
            container.innerHTML = `
                <div class="flex flex-col items-center justify-center py-20 text-slate-500">
                    <span class="material-symbols-outlined text-6xl mb-4">inventory</span>
                    <p class="font-bold">Aucun produit trouvé</p>
                </div>
            `;
            return;
        }

        container.innerHTML = filtered.map(p => `
            <div class="product-card">
                <div class="flex gap-4">
                    <div class="w-20 h-20 rounded-2xl bg-black border border-white/5 p-2 overflow-hidden flex-shrink-0">
                        <img src="${(p.images && p.images[0]) ? p.images[0] : (p.img || '')}" class="w-full h-full object-contain">
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="font-black text-white truncate">${p.name || 'Sans nom'}</h3>
                                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">${p.brand || '—'}</p>
                            </div>
                            <div class="text-right">
                                <p class="font-black text-blue-400">${(p.price || 0).toLocaleString()} <span class="text-[10px]">MAD</span></p>
                                ${p.oldPrice ? `<p class="text-[10px] text-slate-500 line-through">${p.oldPrice.toLocaleString()}</p>` : ''}
                            </div>
                        </div>
                        
                        <div class="flex items-center gap-2 mt-3">
                            <span class="px-2 py-1 bg-white/5 border border-white/10 rounded-lg text-[8px] font-black uppercase tracking-widest text-slate-400">
                                ${p.cat || '—'}
                            </span>
                            ${p.badge ? `<span class="px-2 py-1 bg-${p.badgeColor === 'error' ? 'red-500/10 text-red-500 border-red-500/20' : 'blue-500/10 text-blue-400 border-blue-500/20'} border rounded-lg text-[8px] font-black uppercase tracking-widest">
                                ${p.badge}
                            </span>` : ''}
                            ${p.promoExpiry ? `<span class="px-2 py-1 bg-yellow-500/10 text-yellow-500 border-yellow-500/20 border rounded-lg text-[8px] font-black uppercase tracking-widest flex items-center gap-1">
                                <span class="material-symbols-outlined text-[10px]">timer</span> CHRONO
                            </span>` : ''}
                        </div>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-3 mt-4 pt-4 border-t border-white/5">
                    <button onclick="editProduct(${p.id})" class="flex items-center justify-center gap-2 py-3 rounded-xl bg-blue-500/10 text-blue-400 font-bold text-xs">
                        <span class="material-symbols-outlined text-sm">edit</span> MODIFIER
                    </button>
                    <button onclick="deleteProduct(${p.id})" class="flex items-center justify-center gap-2 py-3 rounded-xl bg-red-500/10 text-red-500 font-bold text-xs">
                        <span class="material-symbols-outlined text-sm">delete</span> SUPPRIMER
                    </button>
                </div>
            </div>
        `).join('');

        updateDashboardStats();
    }

    function updateDashboardStats() {
        document.getElementById('stat-total').textContent = products.length;
        document.getElementById('stat-phones').textContent = products.filter(p => (p.cat === 'smartphone') || ['iphones', 'samsung', 'xiaomi', 'google'].includes(p.cat)).length;
        document.getElementById('stat-acc').textContent = products.filter(p => (p.cat === 'accessoires' || p.cat === 'accessoire')).length;
        document.getElementById('stat-promo').textContent = products.filter(p => p.oldPrice || p.badge === 'PROMO').length;
    }

    // --- MODAL LOGIC ---
    const modal = document.getElementById('product-modal');
    const form = document.getElementById('product-form');
    const accCatContainer = document.getElementById('acc-cat-container');

    function toggleProductTypeFields() {
        const type = document.getElementById('p-type').value;
        const accContainer = document.getElementById('acc-cat-container');
        
        // Safety checks before toggling
        if (accContainer) {
            accContainer.classList.toggle('hidden', type !== 'accessoire');
        }

        const specsPhone = document.getElementById('specs-smartphone');
        const specsLaptop = document.getElementById('specs-laptop');
        const specsAcc = document.getElementById('specs-accessoire');

        if(specsPhone) specsPhone.classList.add('hidden');
        if(specsLaptop) specsLaptop.classList.add('hidden');
        if(specsAcc) specsAcc.classList.add('hidden');

        if (type === 'smartphone' && specsPhone) {
            specsPhone.classList.remove('hidden');
        } else if (type === 'laptop' && specsLaptop) {
            specsLaptop.classList.remove('hidden');
        } else if (type === 'accessoire' && specsAcc) {
            specsAcc.classList.remove('hidden');
        }
    }

    let currentProductImages = [];

    document.getElementById('p-images-input').addEventListener('change', async (e) => {
        const files = Array.from(e.target.files);
        if (currentProductImages.length + files.length > 4) {
            alert('Maximum 4 images par produit');
            return;
        }

        for (const file of files) {
            const base64 = await convertToBase64(file);
            currentProductImages.push(base64);
        }
        renderImagePreviews();
    });

    function convertToBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });
    }

    function renderImagePreviews() {
        const container = document.getElementById('img-preview-container');
        container.innerHTML = currentProductImages.map((img, idx) => `
            <div class="relative group aspect-square rounded-xl bg-black border border-white/10 overflow-hidden">
                <img src="${img}" class="w-full h-full object-contain">
                <button type="button" onclick="removeImage(${idx})" class="absolute top-1 right-1 w-6 h-6 bg-red-500 text-white rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                    <span class="material-symbols-outlined text-xs">close</span>
                </button>
            </div>
        `).join('');
        
        if (currentProductImages.length === 0) {
            container.innerHTML = `<div class="col-span-2 aspect-video rounded-xl bg-white/5 border border-dashed border-white/10 flex items-center justify-center">
                <p class="text-slate-500 text-xs">Aucune image sélectionnée</p>
            </div>`;
        }
    }

    function removeImage(idx) {
        currentProductImages.splice(idx, 1);
        renderImagePreviews();
    }

    function openAddModal() {
        document.getElementById('edit-id').value = '';
        document.getElementById('modal-title').textContent = 'Ajouter un produit';
        
        // Reset inputs
        document.querySelectorAll('#product-form input, #product-form textarea, #product-form select').forEach(el => { 
            if(el.type !== 'checkbox' && el.id !== 'p-type') el.value = ''; 
        });
        
        // Reset locations to defaults
        document.getElementById('loc-accueil').checked = true;
        document.getElementById('loc-boutique').checked = true;
        document.getElementById('loc-promotions').checked = false;
        document.getElementById('loc-accessoires').checked = false;

        document.getElementById('p-type').value = 'smartphone';
        toggleProductTypeFields();

        currentProductImages = [];
        renderImagePreviews();
        modal.classList.remove('hidden');
    }

    function editProduct(id) {
        const p = products.find(p => p.id === id);
        if (!p) return;

        document.getElementById('edit-id').value = p.id;
        document.getElementById('p-name').value = p.name || '';
        document.getElementById('p-brand').value = p.brand || '';
        
        let type = p.cat;
        if (['iphones', 'samsung', 'xiaomi', 'google'].includes(type)) type = 'smartphone';
        if (type === 'accessoires') type = 'accessoire';
        document.getElementById('p-type').value = type;

        document.getElementById('p-price').value = p.price || 0;
        document.getElementById('p-old-price').value = p.oldPrice || '';
        
        currentProductImages = p.images ? [...p.images] : (p.img ? [p.img] : []);
        
        document.getElementById('p-badge').value = p.badge || '';
        document.getElementById('p-badge-color').value = p.badgeColor || 'primary';
        document.getElementById('p-promo-expiry').value = p.promoExpiry || '';
        
        // Load locations
        const locs = p.locations || ['accueil', 'boutique'];
        document.getElementById('loc-accueil').checked = locs.includes('accueil');
        document.getElementById('loc-boutique').checked = locs.includes('boutique');
        document.getElementById('loc-promotions').checked = locs.includes('promotions');
        document.getElementById('loc-accessoires').checked = locs.includes('accessoires');
        
        toggleProductTypeFields();
        if (type === 'accessoire') {
            document.getElementById('p-acc-cat').value = p.accCat || 'coques';
        }

        renderImagePreviews();
        document.getElementById('modal-title').textContent = 'Modifier';
        modal.classList.remove('hidden');
    }

    function closeModal() {
        modal.classList.add('hidden');
    }

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        try {
            const id = document.getElementById('edit-id').value;
            const type = document.getElementById('p-type').value;

            // Collect selected locations
            const locations = [];
            if (document.getElementById('loc-accueil').checked) locations.push('accueil');
            if (document.getElementById('loc-boutique').checked) locations.push('boutique');
            if (document.getElementById('loc-promotions').checked) locations.push('promotions');
            if (document.getElementById('loc-accessoires').checked) locations.push('accessoires');

            const productData = {
                id: id ? parseInt(id) : Date.now(),
                name: document.getElementById('p-name').value,
                brand: document.getElementById('p-brand').value,
                cat: type,
                price: parseInt(document.getElementById('p-price').value),
                oldPrice: document.getElementById('p-old-price').value ? parseInt(document.getElementById('p-old-price').value) : null,
                promoExpiry: document.getElementById('p-promo-expiry').value || null,
                images: currentProductImages,
                img: currentProductImages[0] || '',
                badge: document.getElementById('p-badge').value || null,
                badgeColor: document.getElementById('p-badge-color').value,
                locations: locations,
                specs: { "NA": "NA" }
            };

            if (type === 'accessoire') {
                productData.accCat = document.getElementById('p-acc-cat').value;
            }

            if (id) {
                const index = products.findIndex(p => p.id == id);
                if (index !== -1) products[index] = productData;
            } else {
                products.push(productData);
            }

            saveProducts();
            renderTable();
            closeModal();
        } catch (error) {
            console.error("Form submission error:", error);
            alert("Erreur lors de l'enregistrement: " + error.message);
        }
    });

    function deleteProduct(id) {
        if (confirm('Voulez-vous vraiment supprimer ce produit ?')) {
            products = products.filter(p => p.id !== id);
            saveProducts();
            renderTable();
        }
    }

    function switchTab(tab) {
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        if (tab === 'list') {
            document.getElementById('nav-list').classList.add('active');
            document.getElementById('page-title').textContent = 'Produits';
            document.getElementById('product-search').value = '';
        } else if (tab === 'promo') {
            document.getElementById('nav-promo').classList.add('active');
            document.getElementById('page-title').textContent = 'Promos';
            document.getElementById('product-search').value = 'promo'; // Auto-filter for promos
        }
        renderTable();
    }

    // Check session (moved to bottom to ensure all variables are initialized)
    if (localStorage.getItem('admin_auth') === 'true') {
        showDashboard();
    }
</script>

</body>
</html>
