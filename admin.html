<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhoneDr Admin - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root {
            --primary: #00aaff;
            --secondary: #7bd0ff;
            --background: #000000;
            --surface: #111114;
            --border: rgba(0, 170, 255, 0.2);
        }
        body {
            background-color: var(--background);
            color: white;
            font-family: 'Manrope', sans-serif;
            overflow-x: hidden;
        }
        .font-headline { font-family: 'Space+Grotesk', sans-serif; }
        .glass-card {
            background: var(--surface);
            border: 1px solid var(--border);
            backdrop-filter: blur(20px);
        }
        .sidebar-link.active {
            background: rgba(0, 170, 255, 0.1);
            color: var(--primary);
            border-right: 4px solid var(--primary);
        }
        .login-card {
            box-shadow: 0 0 40px rgba(0, 170, 255, 0.1);
        }
        input, select, textarea {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--primary) !important;
            outline: none !important;
            box-shadow: 0 0 0 2px rgba(0, 170, 255, 0.2) !important;
        }
        .hidden { display: none !important; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--background); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }

        .modal-overlay {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="login-page" class="fixed inset-0 z-[9999] bg-black flex items-center justify-center p-6">
    <div class="login-card glass-card rounded-[2rem] p-10 w-full max-w-md text-center">
        <div class="mb-8">
            <h1 class="text-3xl font-headline font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-blue-600">PhoneDr Admin</h1>
            <p class="text-slate-400 mt-2 text-sm">Gestion de boutique sécurisée</p>
        </div>
        <form id="login-form" class="space-y-6">
            <div class="text-left">
                <label class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 block ml-1">Mot de passe</label>
                <input type="password" id="admin-password" required class="w-full px-5 py-4 rounded-2xl transition-all" placeholder="••••••••">
            </div>
            <p id="login-error" class="text-red-500 text-sm hidden">Mot de passe incorrect</p>
            <button type="submit" class="w-full py-4 bg-gradient-to-r from-blue-600 to-blue-400 text-white font-bold rounded-2xl shadow-lg hover:shadow-blue-500/20 transition-all active:scale-[0.98]">
                Se connecter
            </button>
        </form>
    </div>
</div>

<!-- DASHBOARD PAGE -->
<div id="dashboard-page" class="flex min-h-screen hidden">
    <!-- Sidebar -->
    <aside class="w-64 bg-[#0a0a0c] border-r border-white/5 flex flex-col fixed inset-y-0 z-50">
        <div class="p-8">
            <h2 class="text-xl font-headline font-black tracking-tighter text-blue-400">PhoneDr Admin</h2>
        </div>
        <nav class="flex-1 px-4 space-y-2">
            <button onclick="switchTab('list')" id="nav-list" class="sidebar-link active w-full flex items-center gap-3 px-6 py-4 rounded-xl text-sm font-bold transition-all text-slate-400 hover:bg-white/5">
                <span class="material-symbols-outlined">inventory_2</span> Produits
            </button>
            <button onclick="openAddModal()" class="w-full flex items-center gap-3 px-6 py-4 rounded-xl text-sm font-bold transition-all text-slate-400 hover:bg-white/5">
                <span class="material-symbols-outlined">add_circle</span> Ajouter produit
            </button>
        </nav>
        <div class="p-4 mt-auto">
            <button onclick="logout()" class="w-full flex items-center gap-3 px-6 py-4 rounded-xl text-sm font-bold transition-all text-red-400 hover:bg-red-500/10">
                <span class="material-symbols-outlined">logout</span> Déconnexion
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 ml-64 p-10">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 id="page-title" class="text-3xl font-headline font-bold">📦 Liste des Produits</h1>
                <div class="flex flex-col gap-1 mt-1">
                    <div class="flex items-center gap-4">
                        <div class="flex items-center gap-2">
                            <div id="conn-status" class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div>
                            <p id="conn-text" class="text-slate-400 text-xs">Déconnecté</p>
                        </div>
                        <button onclick="fixFirebaseConnection()" class="text-[10px] bg-blue-500/10 text-blue-400 border border-blue-500/20 px-2 py-1 rounded hover:bg-blue-500/20 transition-all">🔧 RÉPARER LA CONNEXION</button>
                    </div>
                    <p id="error-msg" class="text-[10px] text-red-500 font-mono hidden"></p>
                </div>
            </div>
            <div class="flex gap-4">
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500">🔍</span>
                    <input type="text" id="product-search" oninput="renderTable()" placeholder="Rechercher..." class="pl-12 pr-6 py-3 rounded-xl bg-white/5 border border-white/10 w-64 text-sm">
                </div>
                <button onclick="openAddModal()" class="px-6 py-3 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl flex items-center gap-2 transition-all shadow-lg shadow-blue-600/20">
                    <span class="material-symbols-outlined text-sm">add</span> Nouveau
                </button>
            </div>
        </header>

        <!-- Stats Row -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
            <div class="glass-card p-6 rounded-2xl">
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-2">Total Produits</p>
                <p id="stat-total" class="text-3xl font-headline font-black">0</p>
            </div>
            <div class="glass-card p-6 rounded-2xl border-l-4 border-blue-500">
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-2">Smartphones</p>
                <p id="stat-phones" class="text-3xl font-headline font-black">0</p>
            </div>
            <div class="glass-card p-6 rounded-2xl border-l-4 border-purple-500">
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-2">Accessoires</p>
                <p id="stat-acc" class="text-3xl font-headline font-black">0</p>
            </div>
            <div class="glass-card p-6 rounded-2xl border-l-4 border-red-500">
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-2">En Promo</p>
                <p id="stat-promo" class="text-3xl font-headline font-black">0</p>
            </div>
        </div>

        <!-- Products Table -->
        <div class="glass-card rounded-2xl overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-white/5 text-xs font-bold text-slate-400 uppercase tracking-widest">
                    <tr>
                        <th class="px-6 py-4">Image</th>
                        <th class="px-6 py-4">Nom</th>
                        <th class="px-6 py-4">Catégorie</th>
                        <th class="px-6 py-4">Prix</th>
                        <th class="px-6 py-4">Statut</th>
                        <th class="px-6 py-4 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="products-tbody" class="divide-y divide-white/5 text-sm">
                    <!-- Rows here -->
                </tbody>
            </table>
        </div>
    </main>
</div>

<!-- ADD/EDIT MODAL -->
<div id="product-modal" class="fixed inset-0 z-[1000] modal-overlay hidden flex items-center justify-center p-6">
    <div class="glass-card rounded-[2.5rem] w-full max-w-4xl max-h-[90vh] overflow-y-auto p-10 relative">
        <button onclick="closeModal()" class="absolute top-8 right-8 text-slate-400 hover:text-white transition-colors">
            <span class="material-symbols-outlined text-3xl">close</span>
        </button>
        
        <h2 id="modal-title" class="text-3xl font-headline font-bold mb-8">Ajouter un produit</h2>
        
        <form id="product-form" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <input type="hidden" id="edit-id">
            
            <div class="space-y-6">
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 block ml-1">Nom du produit</label>
                    <input type="text" id="p-name" required class="w-full px-5 py-3 rounded-xl" placeholder="ex: iPhone 15 Pro">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 block ml-1">Marque</label>
                        <input type="text" id="p-brand" required class="w-full px-5 py-3 rounded-xl" placeholder="ex: Apple">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 block ml-1">Type de produit</label>
                        <select id="p-type" required class="w-full px-5 py-3 rounded-xl appearance-none bg-surface" onchange="toggleProductTypeFields()">
                            <option value="smartphone">Téléphone</option>
                            <option value="laptop">Ordinateur (PC)</option>
                            <option value="accessoire">Accessoire</option>
                        </select>
                    </div>
                </div>

                <div id="acc-cat-container" class="hidden">
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 block ml-1">Catégorie d'accessoire</label>
                    <select id="p-acc-cat" class="w-full px-5 py-3 rounded-xl appearance-none bg-surface">
                        <option value="coques">Coques & Protections</option>
                        <option value="chargeurs">Chargeurs & Câbles</option>
                        <option value="casques">Casques & Audio</option>
                        <option value="ordinateurs">Accessoires PC</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 block ml-1">Prix (MAD)</label>
                        <input type="number" id="p-price" required class="w-full px-5 py-3 rounded-xl" placeholder="ex: 12499">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 block ml-1">Prix Barré (Optionnel)</label>
                        <input type="number" id="p-old-price" class="w-full px-5 py-3 rounded-xl" placeholder="ex: 13999">
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 block ml-1">Images du produit (Max 4)</label>
                    <input type="file" id="p-images-input" accept="image/*" multiple class="hidden">
                    <button type="button" onclick="document.getElementById('p-images-input').click()" class="w-full px-5 py-3 rounded-xl bg-white/5 border border-dashed border-white/20 hover:border-blue-500/50 hover:bg-blue-500/5 transition-all flex items-center justify-center gap-2 mb-4">
                        <span class="material-symbols-outlined">upload_file</span>
                        Choisir des images
                    </button>
                    <div id="img-preview-container" class="grid grid-cols-2 gap-3">
                        <!-- Preview thumbnails here -->
                    </div>
                </div>

                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 block ml-1">Badge / Étiquette</label>
                    <div class="flex gap-2">
                        <input type="text" id="p-badge" class="flex-1 px-5 py-3 rounded-xl" placeholder="ex: PROMO">
                        <select id="p-badge-color" class="px-5 py-3 rounded-xl">
                            <option value="primary">Bleu</option>
                            <option value="error">Rouge</option>
                            <option value="secondary">Cyan</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Locations -->
            <div class="md:col-span-2">
                <label class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 block ml-1">Afficher ce produit dans (Emplacements)</label>
                <div class="flex flex-wrap gap-4 bg-white/5 p-4 rounded-xl border border-white/10">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="loc-accueil" checked class="w-4 h-4 rounded bg-surface border-white/20 accent-blue-500">
                        <span class="text-sm">Page d'accueil</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="loc-boutique" checked class="w-4 h-4 rounded bg-surface border-white/20 accent-blue-500">
                        <span class="text-sm">Boutique (Téléphones)</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="loc-promotions" class="w-4 h-4 rounded bg-surface border-white/20 accent-blue-500">
                        <span class="text-sm">Promotions</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="loc-accessoires" class="w-4 h-4 rounded bg-surface border-white/20 accent-blue-500">
                        <span class="text-sm">Accessoires</span>
                    </label>
                </div>
            </div>

            <!-- Specs -->
            <div class="md:col-span-2">
                <label class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 block ml-1">Détails techniques (Optionnels)</label>
                
                <!-- Specs: Smartphone -->
                <div id="specs-smartphone" class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <input type="text" id="spec-ecran-phone" class="w-full px-4 py-2 rounded-xl text-sm" placeholder="Écran (ex: 6.1 OLED)">
                    <input type="text" id="spec-puce-phone" class="w-full px-4 py-2 rounded-xl text-sm" placeholder="Puce (ex: A17 Pro)">
                    <input type="text" id="spec-camera-phone" class="w-full px-4 py-2 rounded-xl text-sm" placeholder="Caméra (ex: 48MP)">
                    <input type="text" id="spec-batterie-phone" class="w-full px-4 py-2 rounded-xl text-sm" placeholder="Batterie (ex: 5000mAh)">
                </div>

                <!-- Specs: PC -->
                <div id="specs-laptop" class="grid grid-cols-2 md:grid-cols-5 gap-4 hidden">
                    <input type="text" id="spec-ecran-pc" class="w-full px-4 py-2 rounded-xl text-sm" placeholder="Écran (ex: 15.6 FHD)">
                    <input type="text" id="spec-cpu-pc" class="w-full px-4 py-2 rounded-xl text-sm" placeholder="CPU (ex: i7 13th Gen)">
                    <input type="text" id="spec-ram-pc" class="w-full px-4 py-2 rounded-xl text-sm" placeholder="RAM (ex: 16GB)">
                    <input type="text" id="spec-stockage-pc" class="w-full px-4 py-2 rounded-xl text-sm" placeholder="Stockage (ex: 512GB SSD)">
                    <input type="text" id="spec-gpu-pc" class="w-full px-4 py-2 rounded-xl text-sm" placeholder="GPU (ex: RTX 4060)">
                </div>

                <!-- Specs: Accessoire -->
                <div id="specs-accessoire" class="grid grid-cols-1 md:grid-cols-2 gap-4 hidden">
                    <input type="text" id="spec-compat-acc" class="w-full px-4 py-2 rounded-xl text-sm" placeholder="Compatibilité (ex: iPhone 15 / Galaxy S24)">
                    <input type="text" id="spec-feature-acc" class="w-full px-4 py-2 rounded-xl text-sm" placeholder="Particularité (ex: Charge rapide 20W)">
                </div>
            </div>

            <div class="md:col-span-2">
                <label class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 block ml-1">Description courte (Optionnelle)</label>
                <textarea id="p-desc" rows="3" class="w-full px-5 py-3 rounded-xl resize-none" placeholder="Description attractive du produit..."></textarea>
            </div>

            <div class="md:col-span-2 flex justify-end gap-4 pt-4">
                <button type="button" onclick="closeModal()" class="px-8 py-4 rounded-xl border border-white/10 font-bold hover:bg-white/5 transition-all">Annuler</button>
                <button type="submit" class="px-10 py-4 rounded-xl bg-blue-600 text-white font-bold shadow-lg shadow-blue-600/30 hover:bg-blue-500 transition-all">Enregistrer</button>
            </div>
        </form>
    </div>
</div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyCDY3W5Nu4zqmufyYIVyAE2_ReDMHc1eww",
        authDomain: "phonedr-83a27.firebaseapp.com",
        projectId: "phonedr-83a27",
        databaseURL: localStorage.getItem('phonedr_db_url') || "https://phonedr-83a27-default-rtdb.firebaseio.com"
    };
    
    function fixFirebaseConnection() {
        const variants = [
            "https://phonedr-83a27-default-rtdb.firebaseio.com",
            "https://phonedr-83a27.firebaseio.com",
            "https://phonedr-83a27-default-rtdb.europe-west1.firebasedatabase.app"
        ];
        let current = localStorage.getItem('phonedr_db_url') || variants[0];
        let nextIndex = (variants.indexOf(current) + 1) % variants.length;
        localStorage.setItem('phonedr_db_url', variants[nextIndex]);
        alert("Tentative avec une nouvelle adresse... Le site va redémarrer.\nNouvelle adresse testée : " + variants[nextIndex]);
        location.reload();
    }
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const productsRef = db.ref('phonedr_products');

    // Connection Status Monitor
    const statusDot = document.getElementById('conn-status');
    const statusText = document.getElementById('conn-text');
    const errorMsg = document.getElementById('error-msg');
    
    db.ref('.info/connected').on('value', (snap) => {
        if (snap.val() === true) {
            statusDot.className = 'w-2 h-2 rounded-full bg-green-500';
            statusText.textContent = "Connecté";
            statusText.className = 'text-green-400 text-xs';
            if (errorMsg) errorMsg.classList.add('hidden');
        } else {
            statusDot.className = 'w-2 h-2 rounded-full bg-red-500 animate-pulse';
            statusText.textContent = "Déconnecté";
            statusText.className = 'text-red-400 text-xs';
        }
    });

    // Error Listener for Products
    productsRef.on('value', (snap) => {
        // Success handled by existing loadProducts logic
    }, (error) => {
        console.error("Erreur Firebase:", error);
        if (errorMsg) {
            errorMsg.textContent = "Erreur: " + error.message;
            errorMsg.classList.remove('hidden');
        }
    });

    // --- AUTH LOGIC ---
    const loginForm = document.getElementById('login-form');
    const loginPage = document.getElementById('login-page');
    const dashboardPage = document.getElementById('dashboard-page');
    // Check session will be done at the bottom of the script
    loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const pass = document.getElementById('admin-password').value;
        if (pass === 'phonedr2024') {
            localStorage.setItem('admin_auth', 'true');
            showDashboard();
        } else {
            document.getElementById('login-error').classList.remove('hidden');
        }
    });

    function showDashboard() {
        loginPage.classList.add('hidden');
        dashboardPage.classList.remove('hidden');
        loadProducts();
        renderTable();
    }

    function logout() {
        localStorage.removeItem('admin_auth');
        location.reload();
    }

    // --- PRODUCT LOGIC ---
    let products = [];
    const DEFAULT_PRODUCTS = [
      { id: 1, name: "iPhone 15 Pro", brand: "Apple", cat: "iphones", price: 12499, oldPrice: 13999, img: "https://m.media-amazon.com/images/I/81SigAnN7pL._AC_SL1500_.jpg", badge: "PREMIUM", badgeColor: "primary", desc: "Le titane arrive sur iPhone. Une puce A17 Pro révolutionnaire.", specs: { "Écran": "6.1\" Super Retina XDR", "Puce": "A17 Pro", "Caméra": "48MP Main", "Batterie": "23h lecture vidéo" } },
      { id: 2, name: "Samsung S24 Ultra", brand: "Samsung", cat: "samsung", price: 11999, oldPrice: 12999, img: "https://m.media-amazon.com/images/I/71RZA9L78yL._AC_SL1500_.jpg", badge: "NOUVEAU", badgeColor: "secondary", desc: "L'ère de l'IA mobile est là. Un zoom optique incroyable.", specs: { "Écran": "6.8\" QHD+ Dynamic AMOLED", "Puce": "Snapdragon 8 Gen 3", "Caméra": "200MP Main", "Batterie": "5000mAh" } },
      { id: 3, name: "AirPods Pro 2", brand: "Apple", cat: "accessoires", accCat: "casques", price: 2499, oldPrice: 2999, img: "https://m.media-amazon.com/images/I/61f1Yf71HeL._AC_SL1500_.jpg", badge: "PROMO", badgeColor: "error", desc: "Réduction active du bruit deux fois plus performante.", specs: { "Puce": "H2 Apple", "Audio": "Spatial personnalisé", "Autonomie": "6h / 30h avec boîtier", "Résistance": "IP54" } },
      { id: 4, name: "Google Pixel 8 Pro", brand: "Google", cat: "google", price: 8999, oldPrice: 9999, img: "https://m.media-amazon.com/images/I/7190G98i3mL._AC_SL1500_.jpg", badge: "PREMIUM", badgeColor: "primary", desc: "Le meilleur de Google AI. Un appareil photo exceptionnel.", specs: { "Écran": "6.7\" LTPO OLED", "Puce": "Google Tensor G3", "Caméra": "50MP Triple", "Batterie": "5050mAh" } },
      { id: 5, name: "MacBook Air M3", brand: "Apple", cat: "accessoires", accCat: "ordinateurs", price: 14499, oldPrice: 15999, img: "https://m.media-amazon.com/images/I/71ItMZBcNYL._AC_SL1500_.jpg", badge: "PROMO", badgeColor: "error", desc: "Superpuissant. Superfin. Puce M3 ultra-rapide.", specs: { "Puce": "Apple M3", "Écran": "13.6\" Liquid Retina", "RAM": "8GB/16GB Unified", "Stockage": "256GB/512GB SSD" } },
      { id: 6, name: "Chargeur MagSafe", brand: "Apple", cat: "accessoires", accCat: "chargeurs", price: 499, oldPrice: 599, img: "https://m.media-amazon.com/images/I/51H7Mv8C47L._AC_SL1000_.jpg", badge: "ESSENTIEL", badgeColor: "primary", desc: "Recharge sans fil rapide et alignement magnétique parfait.", specs: { "Puissance": "Jusqu'à 15W", "Connecteur": "USB-C", "Compatibilité": "iPhone 12 et +" } }
    ];

    function loadProducts() {
        console.log("Tentative de chargement des produits depuis:", productsRef.toString());
        productsRef.on('value', (snapshot) => {
            const data = snapshot.val();
            console.log("Données reçues de Firebase:", data);
            if (data) {
                // Firebase Realtime DB might store as object or array
                if (Array.isArray(data)) {
                    products = data.filter(p => p !== null);
                } else {
                    products = Object.values(data);
                }
            } else {
                console.log("Base de données vide, chargement des produits par défaut...");
                products = [...DEFAULT_PRODUCTS];
                saveProducts();
            }
            renderTable();
        }, (error) => {
            console.error("Erreur de lecture Firebase:", error);
            alert("Erreur de lecture : " + error.message);
        });
    }

    function saveProducts() {
        console.log("Sauvegarde des produits...", products);
        productsRef.set(products).then(() => {
            console.log("Sauvegarde réussie !");
        }).catch(error => {
            console.error("ERREUR DE SAUVEGARDE FIREBASE:", error);
            alert("ERREUR DE SAUVEGARDE : " + error.message + "\n\nAssurez-vous que vos règles Firebase sont en .read: true et .write: true.");
        });
    }

    function renderTable() {
        const tbody = document.getElementById('products-tbody');
        const query = document.getElementById('product-search').value.toLowerCase();
        
        const filtered = products.filter(p => 
            (p.name || '').toLowerCase().includes(query) || 
            (p.brand || '').toLowerCase().includes(query) ||
            (p.cat || '').toLowerCase().includes(query)
        );

        tbody.innerHTML = filtered.map(p => `
            <tr class="hover:bg-white/[0.02] transition-colors group">
                <td class="px-6 py-4">
                    <div class="w-12 h-12 rounded-lg bg-black border border-white/5 p-1 overflow-hidden">
                        <img src="${(p.images && p.images[0]) ? p.images[0] : (p.img || '')}" class="w-full h-full object-contain" alt="">
                    </div>
                </td>
                <td class="px-6 py-4">
                    <div class="font-bold text-white">${p.name || 'Sans nom'}</div>
                    <div class="text-xs text-slate-500">${p.brand || '—'}</div>
                </td>
                <td class="px-6 py-4">
                    <span class="px-2 py-1 bg-white/5 border border-white/10 rounded text-[10px] font-bold uppercase tracking-widest text-slate-400">
                        ${p.cat || '—'} ${p.accCat ? '• ' + p.accCat : ''}
                    </span>
                </td>
                <td class="px-6 py-4">
                    <div class="font-bold text-blue-400">${(p.price || 0).toLocaleString()} MAD</div>
                    ${p.oldPrice ? `<div class="text-xs text-slate-500 line-through">${p.oldPrice.toLocaleString()}</div>` : ''}
                </td>
                <td class="px-6 py-4">
                    ${p.badge ? `<span class="px-2 py-1 bg-${p.badgeColor === 'error' ? 'red-500/10 text-red-500 border-red-500/20' : 'blue-500/10 text-blue-400 border-blue-500/20'} border rounded text-[10px] font-bold uppercase tracking-widest">
                        ${p.badge}
                    </span>` : '<span class="text-slate-600 text-xs">—</span>'}
                </td>
                <td class="px-6 py-4 text-right">
                    <div class="flex justify-end gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="editProduct(${p.id})" class="p-2 hover:bg-blue-500/20 rounded-lg text-blue-400 transition-all">
                            <span class="material-symbols-outlined text-sm">edit</span>
                        </button>
                        <button onclick="deleteProduct(${p.id})" class="p-2 hover:bg-red-500/20 rounded-lg text-red-500 transition-all">
                            <span class="material-symbols-outlined text-sm">delete</span>
                        </button>
                    </div>
                </td>
            </tr>
        `).join('');

        updateDashboardStats();
    }

    function updateDashboardStats() {
        document.getElementById('stat-total').textContent = products.length;
        document.getElementById('stat-phones').textContent = products.filter(p => (p.cat === 'smartphone') || ['iphones', 'samsung', 'xiaomi', 'google'].includes(p.cat)).length;
        document.getElementById('stat-acc').textContent = products.filter(p => (p.cat === 'accessoires' || p.cat === 'accessoire')).length;
        document.getElementById('stat-promo').textContent = products.filter(p => p.oldPrice || p.badge === 'PROMO').length;
    }

    // --- MODAL LOGIC ---
    const modal = document.getElementById('product-modal');
    const form = document.getElementById('product-form');
    const accCatContainer = document.getElementById('acc-cat-container');

    function toggleProductTypeFields() {
        const type = document.getElementById('p-type').value;
        const accContainer = document.getElementById('acc-cat-container');
        const specsPhone = document.getElementById('specs-smartphone');
        const specsLaptop = document.getElementById('specs-laptop');
        const specsAcc = document.getElementById('specs-accessoire');

        accContainer.classList.add('hidden');
        specsPhone.classList.add('hidden');
        specsLaptop.classList.add('hidden');
        specsAcc.classList.add('hidden');

        if (type === 'smartphone') {
            specsPhone.classList.remove('hidden');
        } else if (type === 'laptop') {
            specsLaptop.classList.remove('hidden');
        } else if (type === 'accessoire') {
            accContainer.classList.remove('hidden');
            specsAcc.classList.remove('hidden');
        }
    }

    let currentProductImages = [];

    document.getElementById('p-images-input').addEventListener('change', async (e) => {
        const files = Array.from(e.target.files);
        if (currentProductImages.length + files.length > 4) {
            alert('Maximum 4 images par produit');
            return;
        }

        for (const file of files) {
            const base64 = await convertToBase64(file);
            currentProductImages.push(base64);
        }
        renderImagePreviews();
    });

    function convertToBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });
    }

    function renderImagePreviews() {
        const container = document.getElementById('img-preview-container');
        container.innerHTML = currentProductImages.map((img, idx) => `
            <div class="relative group aspect-square rounded-xl bg-black border border-white/10 overflow-hidden">
                <img src="${img}" class="w-full h-full object-contain">
                <button type="button" onclick="removeImage(${idx})" class="absolute top-1 right-1 w-6 h-6 bg-red-500 text-white rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                    <span class="material-symbols-outlined text-xs">close</span>
                </button>
            </div>
        `).join('');
        
        if (currentProductImages.length === 0) {
            container.innerHTML = `<div class="col-span-2 aspect-video rounded-xl bg-white/5 border border-dashed border-white/10 flex items-center justify-center">
                <p class="text-slate-500 text-xs">Aucune image sélectionnée</p>
            </div>`;
        }
    }

    function removeImage(idx) {
        currentProductImages.splice(idx, 1);
        renderImagePreviews();
    }

    function openAddModal() {
        document.getElementById('edit-id').value = '';
        document.getElementById('modal-title').textContent = 'Ajouter un produit';
        
        // Reset inputs
        document.querySelectorAll('#product-form input, #product-form textarea, #product-form select').forEach(el => { if(el.id !== 'p-type') el.value = ''; });
        document.querySelectorAll('#specs-smartphone input, #specs-laptop input, #specs-accessoire input').forEach(input => input.value = '');

        // Reset locations
        document.getElementById('loc-accueil').checked = false;
        document.getElementById('loc-boutique').checked = true;
        document.getElementById('loc-promotions').checked = false;
        document.getElementById('loc-accessoires').checked = false;

        document.getElementById('p-type').value = 'smartphone';
        toggleProductTypeFields();

        currentProductImages = [];
        renderImagePreviews();
        modal.classList.remove('hidden');
    }

    function editProduct(id) {
        const p = products.find(p => p.id === id);
        if (!p) return;

        document.getElementById('edit-id').value = p.id;
        document.getElementById('p-name').value = p.name;
        document.getElementById('p-brand').value = p.brand;
        
        let type = p.cat;
        if (['iphones', 'samsung', 'xiaomi', 'google'].includes(type)) type = 'smartphone';
        if (type === 'accessoires') type = 'accessoire';
        document.getElementById('p-type').value = type;

        document.getElementById('p-price').value = p.price;
        document.getElementById('p-old-price').value = p.oldPrice || '';
        
        currentProductImages = p.images ? [...p.images] : (p.img ? [p.img] : []);
        
        document.getElementById('p-badge').value = p.badge || '';
        document.getElementById('p-badge-color').value = p.badgeColor || 'primary';
        document.getElementById('p-desc').value = p.desc;
        
        toggleProductTypeFields();
        if (type === 'accessoire') {
            document.getElementById('p-acc-cat').value = p.accCat || 'coques';
        }

        document.querySelectorAll('#specs-smartphone input, #specs-laptop input, #specs-accessoire input').forEach(input => input.value = '');
        
        if (type === 'smartphone') {
            document.getElementById('spec-ecran-phone').value = p.specs?.["Écran"] || '';
            document.getElementById('spec-puce-phone').value = p.specs?.["Puce"] || '';
            document.getElementById('spec-camera-phone').value = p.specs?.["Caméra"] || '';
            document.getElementById('spec-batterie-phone').value = p.specs?.["Batterie"] || '';
        } else if (type === 'laptop') {
            document.getElementById('spec-ecran-pc').value = p.specs?.["Écran"] || '';
            document.getElementById('spec-cpu-pc').value = p.specs?.["Processeur"] || '';
            document.getElementById('spec-ram-pc').value = p.specs?.["RAM"] || '';
            document.getElementById('spec-stockage-pc').value = p.specs?.["Stockage"] || '';
            document.getElementById('spec-gpu-pc').value = p.specs?.["Carte Graphique"] || '';
        } else if (type === 'accessoire') {
            document.getElementById('spec-compat-acc').value = p.specs?.["Compatibilité"] || '';
            document.getElementById('spec-feature-acc').value = p.specs?.["Particularité"] || '';
        }

        document.getElementById('loc-accueil').checked = p.locations ? p.locations.includes('accueil') : (p.badge === 'NOUVEAU' || p.badge === 'PREMIUM');
        document.getElementById('loc-boutique').checked = p.locations ? p.locations.includes('boutique') : (p.cat !== 'accessoires');
        document.getElementById('loc-promotions').checked = p.locations ? p.locations.includes('promotions') : (p.badge === 'PROMO' || p.oldPrice > 0);
        document.getElementById('loc-accessoires').checked = p.locations ? p.locations.includes('accessoires') : (p.cat === 'accessoires' || p.cat === 'accessoire');

        renderImagePreviews();
        document.getElementById('modal-title').textContent = 'Modifier le produit';
        modal.classList.remove('hidden');
    }

    function closeModal() {
        modal.classList.add('hidden');
    }

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        try {
            const id = document.getElementById('edit-id').value;
            const locations = [];
            if (document.getElementById('loc-accueil').checked) locations.push('accueil');
            if (document.getElementById('loc-boutique').checked) locations.push('boutique');
            if (document.getElementById('loc-promotions').checked) locations.push('promotions');
            if (document.getElementById('loc-accessoires').checked) locations.push('accessoires');

            const type = document.getElementById('p-type').value;

            const specs = {};
            if (type === 'smartphone') {
                if (document.getElementById('spec-ecran-phone').value) specs["Écran"] = document.getElementById('spec-ecran-phone').value;
                if (document.getElementById('spec-puce-phone').value) specs["Puce"] = document.getElementById('spec-puce-phone').value;
                if (document.getElementById('spec-camera-phone').value) specs["Caméra"] = document.getElementById('spec-camera-phone').value;
                if (document.getElementById('spec-batterie-phone').value) specs["Batterie"] = document.getElementById('spec-batterie-phone').value;
            } else if (type === 'laptop') {
                if (document.getElementById('spec-ecran-pc').value) specs["Écran"] = document.getElementById('spec-ecran-pc').value;
                if (document.getElementById('spec-cpu-pc').value) specs["Processeur"] = document.getElementById('spec-cpu-pc').value;
                if (document.getElementById('spec-ram-pc').value) specs["RAM"] = document.getElementById('spec-ram-pc').value;
                if (document.getElementById('spec-stockage-pc').value) specs["Stockage"] = document.getElementById('spec-stockage-pc').value;
                if (document.getElementById('spec-gpu-pc').value) specs["Carte Graphique"] = document.getElementById('spec-gpu-pc').value;
            } else if (type === 'accessoire') {
                if (document.getElementById('spec-compat-acc').value) specs["Compatibilité"] = document.getElementById('spec-compat-acc').value;
                if (document.getElementById('spec-feature-acc').value) specs["Particularité"] = document.getElementById('spec-feature-acc').value;
            }

            const productData = {
                id: id ? parseInt(id) : Date.now(),
                name: document.getElementById('p-name').value,
                brand: document.getElementById('p-brand').value,
                cat: type,
                price: parseInt(document.getElementById('p-price').value),
                oldPrice: document.getElementById('p-old-price').value ? parseInt(document.getElementById('p-old-price').value) : null,
                images: currentProductImages,
                img: currentProductImages[0] || '',
                badge: document.getElementById('p-badge').value || null,
                badgeColor: document.getElementById('p-badge-color').value,
                desc: document.getElementById('p-desc').value,
                locations: locations,
                specs: Object.keys(specs).length > 0 ? specs : { "NA": "NA" }
            };

            if (type === 'accessoire') {
                productData.accCat = document.getElementById('p-acc-cat').value;
            }

            console.log("Saving product:", productData);

            if (id) {
                const index = products.findIndex(p => p.id == id);
                if (index !== -1) products[index] = productData;
            } else {
                products.push(productData);
            }

            saveProducts();
            renderTable();
            closeModal();
        } catch (error) {
            console.error("Form submission error:", error);
            alert("Erreur lors de l'enregistrement: " + error.message);
        }
    });

    function deleteProduct(id) {
        if (confirm('Voulez-vous vraiment supprimer ce produit ?')) {
            products = products.filter(p => p.id !== id);
            saveProducts();
            renderTable();
        }
    }

    function switchTab(tab) {
        // Simple for now as we only have one tab
        document.getElementById('page-title').textContent = '📦 Liste des Produits';
    }

    // Check session (moved to bottom to ensure all variables are initialized)
    if (localStorage.getItem('admin_auth') === 'true') {
        showDashboard();
    }
</script>

</body>
</html>
